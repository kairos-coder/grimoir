<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ealdforn Abbey · The Grimoir</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0c12;
            background-image: radial-gradient(circle at 25% 40%, #11161f 0%, #05070a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Palatino', 'Georgia', serif;
            padding: 1rem;
        }

        .grimoir {
            max-width: 860px;
            width: 100%;
            background: rgba(8, 10, 16, 0.85);
            backdrop-filter: blur(3px);
            border: 1px solid rgba(90, 110, 130, 0.3);
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            height: 85vh;
            min-height: 560px;
        }

        .grimoir-header {
            padding: 1.2rem 1.6rem 0.8rem;
            border-bottom: 1px solid rgba(210, 190, 150, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .title {
            font-size: 1.2rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ebe9e0, #a7b1b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            font-size: 0.65rem;
            font-family: monospace;
            color: #6a7a8a;
        }

        .output-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.6rem;
        }

        .entry-card {
            background: rgba(15, 18, 26, 0.6);
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            border-left: 3px solid #6b8e5e;
        }

        .entry-meta {
            font-size: 0.65rem;
            font-family: monospace;
            color: #8696aa;
            margin-bottom: 0.4rem;
        }

        .entry-body {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e0e2e9;
        }

        .command-section {
            background: #05070c;
            border-top: 1px solid rgba(120, 130, 150, 0.25);
            padding: 0.8rem 1.2rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        .prompt {
            font-family: monospace;
            color: #9eb2c5;
            font-size: 0.9rem;
        }

        #commandInput {
            flex: 1;
            background: #0f131c;
            border: 1px solid #2a2f3a;
            color: #f0f2f5;
            padding: 0.6rem 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            border-radius: 60px;
            outline: none;
        }

        button {
            background: #1e2532;
            border: none;
            color: #ddd3c2;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
        }

        button:hover {
            background: #2f384a;
        }

        .sys-feedback {
            font-size: 0.7rem;
            font-family: monospace;
            color: #a5b0c0;
            background: #0e121b;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            display: inline-block;
            margin: 0.2rem 1.2rem 0.5rem;
            text-align: right;
        }

        .help-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 7, 12, 0.96);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .help-overlay.visible {
            visibility: visible;
            opacity: 1;
        }

        .help-panel {
            max-width: 450px;
            width: 85%;
            background: #0f131e;
            border: 1px solid #5f6a7a;
            border-radius: 1.5rem;
            padding: 1.5rem;
            position: relative;
        }

        .help-panel h3 {
            font-size: 1.1rem;
            border-bottom: 1px solid #5f6a7a;
            display: inline-block;
            margin-bottom: 1rem;
            color: #cfd9e6;
        }

        .help-panel li {
            margin-bottom: 0.7rem;
            font-size: 0.85rem;
            color: #cddbe9;
            border-left: 2px solid #5f6a7a;
            padding-left: 0.8rem;
            list-style: none;
        }

        .help-panel .cmd {
            font-family: monospace;
            color: #e2bc7c;
        }

        .close-help {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            font-size: 1.3rem;
            cursor: pointer;
            color: #a0abbc;
            background: none;
            border: none;
        }
    </style>
</head>
<body>

<div class="grimoir">
    <div class="grimoir-header">
        <div class="title">Ealdforn Grimoir</div>
        <div class="sub">— working archive —</div>
    </div>

    <div class="output-area" id="outputArea">
        <div class="entry-card">
            <div class="entry-meta">◈ initium ◈</div>
            <div class="entry-body">Type <span style="color:#c3b87c;">relic</span> to read. <span style="color:#9ab3c9;">write [text]</span> to inscribe.</div>
        </div>
    </div>

    <div class="command-section">
        <span class="prompt">⟡</span>
        <input type="text" id="commandInput" placeholder="relic · write the candle remembers" autofocus>
        <button id="submitBtn">invoke</button>
    </div>
    <div style="text-align: right;">
        <span class="sys-feedback" id="sysFeedback">⚙️ ready</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

    const TABLE = 'zeus_entries';

    const outputDiv = document.getElementById('outputArea');
    const commandInput = document.getElementById('commandInput');
    const sysFeedback = document.getElementById('sysFeedback');

    function setFeedback(msg, isError = false) {
        sysFeedback.innerHTML = isError ? `⚠️ ${msg}` : `✦ ${msg}`;
        setTimeout(() => {
            if (sysFeedback.innerHTML === `✦ ${msg}` || sysFeedback.innerHTML === `⚠️ ${msg}`) {
                sysFeedback.innerHTML = `⚙️ ready`;
            }
        }, 2500);
    }

    function formatText(text) {
        if (!text) return '… empty passage …';
        if (text.startsWith('Within the Abbey,')) return text;
        return `Within the Abbey, ${text.charAt(0).toLowerCase() + text.slice(1)}`;
    }

    function addEntryToUI(entry, isWritten = false) {
        if (!entry) return;
        const card = document.createElement('div');
        card.className = 'entry-card';
        const date = entry.created_at ? new Date(entry.created_at).toLocaleString() : 'this moment';
        const icon = isWritten ? '✍️' : '◈';
        const label = isWritten ? 'inscribed' : 'recollection';
        card.innerHTML = `
            <div class="entry-meta">${icon} ${label} · ${date}</div>
            <div class="entry-body">${formatText(entry.body)}</div>
        `;
        outputDiv.appendChild(card);
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function fetchRandomEntry() {
        const url = `${SUPABASE_URL}/rest/v1/${TABLE}?select=id,body,created_at&limit=30`;
        try {
            const res = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!data || data.length === 0) return null;
            const randomIndex = Math.floor(Math.random() * data.length);
            return data[randomIndex];
        } catch (err) {
            console.error('Fetch error:', err);
            setFeedback(`could not reach archive`, true);
            return null;
        }
    }

    async function writeEntry(text) {
        if (!text || !text.trim()) {
            setFeedback('cannot write an empty passage', true);
            return;
        }

        // Generate a simple label from the first few words
        const firstWords = text.trim().split(/\s+/).slice(0, 3).join('_');
        const label = `grimoir_${firstWords}_${Date.now()}`;
        const wordCount = text.trim().split(/\s+/).length;

        const newEntry = {
            label: label,
            body: text.trim(),
            word_count: wordCount,
            created_at: new Date().toISOString()
        };

        const url = `${SUPABASE_URL}/rest/v1/${TABLE}`;
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(newEntry)
            });
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errText}`);
            }
            setFeedback('✧ passage inscribed into the grimoir');
            addEntryToUI({ body: text.trim(), created_at: new Date().toISOString() }, true);
        } catch (err) {
            console.error('Write error:', err);
            setFeedback(`could not inscribe: ${err.message.slice(0, 80)}`, true);
        }
    }

    async function onRelic() {
        setFeedback('searching the archive...');
        const entry = await fetchRandomEntry();
        if (entry) {
            addEntryToUI(entry, false);
            setFeedback('a passage rises from the grimoir');
        } else {
            addEntryToUI({ body: 'The archive is silent. Be the first to write.', created_at: null }, false);
        }
    }

    async function dispatchCommand(cmd) {
        const trimmed = cmd.trim().toLowerCase();
        if (trimmed === 'relic') { await onRelic(); return; }
        if (trimmed.startsWith('write ')) {
            const writeText = cmd.slice(6).trim();
            if (writeText) await writeEntry(writeText);
            else setFeedback('write what?', true);
            return;
        }
        setFeedback(`unknown command: "${cmd}" · try 'relic' or 'write [text]'`, true);
    }

    window.addEventListener('DOMContentLoaded', () => {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.addEventListener('click', async () => {
            const val = commandInput.value;
            if (val) await dispatchCommand(val);
            commandInput.value = '';
            commandInput.focus();
        });
        commandInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = commandInput.value;
                if (val) await dispatchCommand(val);
                commandInput.value = '';
            }
        });
        setFeedback('grimoir ready · write or relic');
        commandInput.focus();
    });
</script>
</body>
</html>
