<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 The Recursive Grimoire · Eternal Branching Deck</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #141420;
  --text: #c8c8d4;
  --accent: #7eb8a0;
  --accent2: #b87e9e;
  --accent3: #c8a87e;
  --glow: rgba(126,184,160,0.3);
  --font-display: 'Georgia', serif;
  --font-body: 'Georgia', serif;
  --font-mono: 'Courier New', monospace;
  --card-radius: 12px;
  --card-padding: 1.5rem;
  --split-ratio: 50fr 50fr;
  --overlay-opacity: 0.05;
  --generation: 0;
  transition: all 0.8s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Generation Counter ── */
#genCounter {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 1000;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--accent);
  background: var(--surface);
  padding: 0.4rem 0.8rem;
  border-radius: 20px;
  border: 1px solid var(--accent);
  opacity: 0.8;
  pointer-events: none;
}
#genCounter .gen-num { font-size: 1.2rem; font-weight: bold; }

/* ── Branch Forest ── */
#branchForest {
  padding: 1rem;
  min-height: 100vh;
}

/* ── Branch Container ── */
.branch-node {
  margin: 0.5rem 0;
  animation: branchIn 0.6s ease-out;
  position: relative;
}
@keyframes branchIn {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

/* ── Card ── */
.grimoire-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--card-radius);
  padding: var(--card-padding);
  position: relative;
  overflow: hidden;
  transition: all 0.5s ease;
}
.grimoire-card::before {
  content: '';
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  opacity: var(--overlay-opacity);
  pointer-events: none;
  transition: opacity 0.5s ease;
}
.grimoire-card:hover {
  box-shadow: 0 0 20px var(--glow);
  transform: translateY(-2px);
}
.grimoire-card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.8rem;
}
.grimoire-card .card-number {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--accent);
  opacity: 0.7;
}
.grimoire-card .card-gen {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--accent3);
  opacity: 0.6;
}
.grimoire-card .card-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--accent);
  margin-bottom: 0.5rem;
  letter-spacing: 0.5px;
}
.grimoire-card .card-body {
  font-size: 0.85rem;
  line-height: 1.6;
  color: var(--text);
}
.grimoire-card .card-tags {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-top: 0.8rem;
}
.grimoire-card .card-tag {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  padding: 0.15rem 0.4rem;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--accent3);
}

/* ── Split Container ── */
.split-container {
  display: grid;
  gap: 0.5rem;
  margin: 0.5rem 0;
  animation: branchIn 0.6s ease-out;
}
.split-container.horizontal { grid-template-columns: var(--split-ratio); }
.split-container.vertical { grid-template-rows: var(--split-ratio); }
.split-container.diagonal {
  grid-template-columns: 1fr 1fr;
  transform: skewY(-0.5deg);
}
.split-container .split-cell {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--card-radius);
  padding: var(--card-padding);
  min-height: 120px;
}

/* ── Mutation Indicators ── */
.mutation-badge {
  position: absolute;
  top: 0.4rem;
  right: 0.4rem;
  font-family: var(--font-mono);
  font-size: 0.45rem;
  padding: 0.1rem 0.3rem;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: var(--accent2);
  opacity: 0.6;
}

/* ── Scroll Sentinel ── */
#scrollSentinel {
  height: 1px;
  width: 100%;
}

/* ── Typography Drift States ── */
body.drift-serif { --font-body: 'Georgia', serif; --font-display: 'Georgia', serif; }
body.drift-mono { --font-body: 'Courier New', monospace; --font-display: 'Courier New', monospace; }
body.drift-sans { --font-body: 'Helvetica', sans-serif; --font-display: 'Helvetica', sans-serif; }

/* ── Color Mutation States ── */
body.palette-void { --bg: #050510; --surface: #0d0d20; --accent: #6090b0; --accent2: #b06090; }
body.palette-ember { --bg: #100a05; --surface: #1a0f08; --accent: #d08040; --accent2: #d04040; }
body.palette-moss { --bg: #050f08; --surface: #0a1a10; --accent: #60b870; --accent2: #b8a060; }
body.palette-twilight { --bg: #0a0515; --surface: #150d25; --accent: #9070c8; --accent2: #7090c8; }
</style>
</head>
<body>

<div id="genCounter">
  🌿 Gen <span class="gen-num" id="genNum">0</span>
</div>

<div id="branchForest"></div>
<div id="scrollSentinel"></div>

<script type="module">
// ════════════════════════════════════════════
// RECURSIVE GRIMOIRE · Eternal Branching Deck
// ════════════════════════════════════════════

// ── 22-Card Deck ──
const DECK = [
  { num: 0,  title: 'The Fool',        tags: ['beginning','innocence','leap'],        body: 'Step off the cliff. The void catches those who trust it.' },
  { num: 1,  title: 'The Magician',    tags: ['will','manifestation','tools'],        body: 'As above, so below. The will shapes the world through focused intent.' },
  { num: 2,  title: 'The High Priestess', tags: ['intuition','mystery','veil'],      body: 'Behind the veil lies knowing that words cannot carry.' },
  { num: 3,  title: 'The Empress',     tags: ['abundance','nature','creation'],       body: 'From fertile darkness, all forms emerge. Nurture what grows.' },
  { num: 4,  title: 'The Emperor',     tags: ['structure','authority','order'],       body: 'Build the walls that hold the garden. Structure enables freedom.' },
  { num: 5,  title: 'The Hierophant',  tags: ['tradition','teaching','ritual'],       body: 'The old ways hold keys that the new world has forgotten.' },
  { num: 6,  title: 'The Lovers',      tags: ['choice','union','harmony'],            body: 'Every choice is a marriage to a path. Choose with open eyes.' },
  { num: 7,  title: 'The Chariot',     tags: ['willpower','direction','triumph'],     body: 'Harness opposing forces. Drive them toward a single purpose.' },
  { num: 8,  title: 'Strength',        tags: ['courage','patience','inner-power'],    body: 'Gentle persistence tames the wildest beast within.' },
  { num: 9,  title: 'The Hermit',      tags: ['solitude','wisdom','inner-light'],     body: 'In silence, the lantern reveals what noise obscured.' },
  { num: 10, title: 'Wheel of Fortune', tags: ['cycles','destiny','turning-point'],   body: 'What rises must fall. What falls will rise again. Spin with it.' },
  { num: 11, title: 'Justice',         tags: ['balance','truth','consequence'],       body: 'Every action echoes. The scales remember what the mind forgets.' },
  { num: 12, title: 'The Hanged One',  tags: ['surrender','perspective','pause'],     body: 'Upside down, the world makes different sense. Let go to see.' },
  { num: 13, title: 'Death',           tags: ['transformation','ending','rebirth'],   body: 'What dies feeds what is born. The compost nourishes the seed.' },
  { num: 14, title: 'Temperance',      tags: ['balance','patience','alchemy'],        body: 'Blend fire and water. The middle path brews the strongest medicine.' },
  { num: 15, title: 'The Devil',       tags: ['shadow','attachment','liberation'],    body: 'Chains are often self-forged. Name the binding to break it.' },
  { num: 16, title: 'The Tower',       tags: ['upheaval','revelation','collapse'],    body: 'False structures crumble. The lightning reveals what was hidden in the walls.' },
  { num: 17, title: 'The Star',        tags: ['hope','healing','guidance'],           body: 'After the storm, a single light. Pour your vessel into the stream.' },
  { num: 18, title: 'The Moon',        tags: ['illusion','dreams','subconscious'],    body: 'Not all paths are straight. The moonlight shows what daylight blinds.' },
  { num: 19, title: 'The Sun',         tags: ['clarity','vitality','joy'],            body: 'Full illumination. The shadow retreats and warmth fills every corner.' },
  { num: 20, title: 'Judgement',       tags: ['awakening','reckoning','calling'],     body: 'Hear the call. Rise from the sleep of forgetting into purpose.' },
  { num: 21, title: 'The World',       tags: ['completion','wholeness','integration'], body: 'The circle closes. All fragments reunite. The dance is complete.' }
];

// ── State ──
let generation = 0;
let branchCount = 0;
const MAX_BRANCHES = 50; // Safety limit (can be removed for true infinity)

// ── Mutation Types ──
const MUTATIONS = [
  'split_horizontal',
  'split_vertical',
  'split_diagonal',
  'replace_card',
  'spawn_sibling',
  'typography_drift',
  'color_palette_shift',
  'overlay_shift',
  'aspect_swap',
  'font_size_drift'
];

// ── Ancestor Memory Stack ──
const ancestorStack = [];

function pushAncestor(data) {
  ancestorStack.push({ ...data, timestamp: Date.now(), generation });
  if (ancestorStack.length > 100) ancestorStack.shift();
}

// ── Branch Spawner ──
function spawnBranch(mutationType = null) {
  if (branchCount >= MAX_BRANCHES) {
    console.log('🌿 Maximum branches reached. The grimoire rests.');
    return;
  }
  
  generation++;
  branchCount++;
  
  // Pick mutation if not specified
  if (!mutationType) {
    mutationType = MUTATIONS[Math.floor(Math.random() * MUTATIONS.length)];
  }
  
  console.log(`🌿 Gen ${generation}: ${mutationType}`);
  
  const forest = document.getElementById('branchForest');
  
  switch (mutationType) {
    case 'split_horizontal':
      spawnSplit('horizontal', forest);
      break;
    case 'split_vertical':
      spawnSplit('vertical', forest);
      break;
    case 'split_diagonal':
      spawnSplit('diagonal', forest);
      break;
    case 'replace_card':
      spawnReplaceCard(forest);
      break;
    case 'spawn_sibling':
      spawnSibling(forest);
      break;
    case 'typography_drift':
      applyTypographyDrift();
      spawnCard(forest); // Still spawn a card
      break;
    case 'color_palette_shift':
      applyColorShift();
      spawnCard(forest);
      break;
    case 'overlay_shift':
      applyOverlayShift();
      spawnCard(forest);
      break;
    case 'aspect_swap':
      applyAspectSwap();
      spawnCard(forest);
      break;
    case 'font_size_drift':
      applyFontSizeDrift();
      spawnCard(forest);
      break;
    default:
      spawnCard(forest);
  }
  
  // Update counter
  document.getElementById('genNum').textContent = generation;
  
  // Push to ancestor memory
  pushAncestor({ mutationType, branchCount });
}

// ── Spawn Functions ──

function spawnCard(parent) {
  const card = DECK[Math.floor(Math.random() * DECK.length)];
  
  const node = document.createElement('div');
  node.className = 'branch-node';
  node.innerHTML = `
    <div class="grimoire-card">
      <span class="mutation-badge">🌿 gen ${generation}</span>
      <div class="card-header">
        <span class="card-number">#${card.num}</span>
        <span class="card-gen">branch ${branchCount}</span>
      </div>
      <div class="card-title">${card.title}</div>
      <div class="card-body">${card.body}</div>
      <div class="card-tags">
        ${card.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
      </div>
    </div>
  `;
  parent.appendChild(node);
  node.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function spawnSplit(direction, parent) {
  const container = document.createElement('div');
  container.className = `split-container ${direction}`;
  
  const cell1 = document.createElement('div');
  cell1.className = 'split-cell';
  const card1 = DECK[Math.floor(Math.random() * DECK.length)];
  cell1.innerHTML = `
    <span class="mutation-badge">⬡ split ${direction}</span>
    <div class="card-title" style="color:var(--accent)">${card1.title}</div>
    <div class="card-body">${card1.body}</div>
  `;
  
  const cell2 = document.createElement('div');
  cell2.className = 'split-cell';
  const card2 = DECK[Math.floor(Math.random() * DECK.length)];
  cell2.innerHTML = `
    <span class="mutation-badge">gen ${generation}</span>
    <div class="card-title" style="color:var(--accent2)">${card2.title}</div>
    <div class="card-body">${card2.body}</div>
  `;
  
  container.appendChild(cell1);
  container.appendChild(cell2);
  parent.appendChild(container);
  container.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function spawnReplaceCard(parent) {
  // Replace: change how cards render by modifying the function itself
  const card = DECK[Math.floor(Math.random() * DECK.length)];
  
  const node = document.createElement('div');
  node.className = 'branch-node';
  node.innerHTML = `
    <div class="grimoire-card" style="border-style:dashed; border-color:var(--accent2); transform:rotate(-0.3deg);">
      <span class="mutation-badge">🔄 replaced render</span>
      <div class="card-header">
        <span class="card-number">#${card.num}</span>
        <span class="card-gen">variant ${branchCount}</span>
      </div>
      <div class="card-title" style="writing-mode:horizontal-tb; text-orientation:mixed;">${card.title.split('').join(' ')}</div>
      <div class="card-body" style="font-style:italic; border-left:2px solid var(--accent3); padding-left:0.8rem;">${card.body}</div>
      <div class="card-tags">
        ${card.tags.map(t => `<span class="card-tag" style="background:rgba(255,255,255,0.08);">${t}</span>`).join('')}
      </div>
    </div>
  `;
  parent.appendChild(node);
  node.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function spawnSibling(parent) {
  // Spawn two cards side by side
  const container = document.createElement('div');
  container.className = 'split-container horizontal';
  container.style.setProperty('--split-ratio', '50fr 50fr');
  
  for (let i = 0; i < 2; i++) {
    const cell = document.createElement('div');
    cell.className = 'split-cell';
    const card = DECK[Math.floor(Math.random() * DECK.length)];
    cell.innerHTML = `
      <span class="mutation-badge">👥 sibling ${i+1}</span>
      <div class="card-title" style="color:var(--accent)">${card.title}</div>
      <div class="card-body">${card.body}</div>
    `;
    container.appendChild(cell);
  }
  
  parent.appendChild(container);
  container.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// ── CSS Mutation Functions ──

function applyTypographyDrift() {
  const drifts = ['drift-serif', 'drift-mono', 'drift-sans'];
  const current = drifts.find(d => document.body.classList.contains(d));
  const next = drifts[(drifts.indexOf(current) + 1) % drifts.length] || drifts[0];
  
  document.body.classList.remove(...drifts);
  document.body.classList.add(next);
  console.log(`🔤 Typography drift: ${next}`);
}

function applyColorShift() {
  const palettes = ['palette-void', 'palette-ember', 'palette-moss', 'palette-twilight'];
  const current = palettes.find(p => document.body.classList.contains(p));
  const next = palettes[(palettes.indexOf(current) + 1) % palettes.length] || palettes[0];
  
  document.body.classList.remove(...palettes);
  document.body.classList.add(next);
  console.log(`🎨 Palette shift: ${next}`);
}

function applyOverlayShift() {
  const root = document.documentElement;
  const current = parseFloat(getComputedStyle(root).getPropertyValue('--overlay-opacity'));
  const next = Math.min(0.2, Math.max(0.02, current + (Math.random() * 0.06 - 0.03)));
  root.style.setProperty('--overlay-opacity', next);
  console.log(`🌫️ Overlay shift: ${next.toFixed(3)}`);
}

function applyAspectSwap() {
  const root = document.documentElement;
  const ratios = ['60fr 40fr', '40fr 60fr', '70fr 30fr', '30fr 70fr'];
  const next = ratios[Math.floor(Math.random() * ratios.length)];
  root.style.setProperty('--split-ratio', next);
  console.log(`📐 Aspect swap: ${next}`);
}

function applyFontSizeDrift() {
  const root = document.documentElement;
  const current = parseFloat(getComputedStyle(root).fontSize);
  const drift = (Math.random() * 2 - 1) * 0.5; // ±0.5px
  const next = Math.min(18, Math.max(12, current + drift));
  root.style.fontSize = next + 'px';
  console.log(`📏 Font drift: ${next.toFixed(1)}px`);
}

// ── Intersection Observer (Scroll Sentinel) ──
const sentinel = document.getElementById('scrollSentinel');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      console.log('⬇️ Bottom reached — spawning branch...');
      spawnBranch();
    }
  });
}, {
  root: null,
  rootMargin: '0px',
  threshold: 0.1
});

observer.observe(sentinel);

// ── Initialize ──
function init() {
  console.log('🌿 Recursive Grimoire — Initializing...');
  console.log(`📜 ${DECK.length} cards loaded`);
  console.log(`🔀 ${MUTATIONS.length} mutation types available`);
  
  // Spawn initial card
  const forest = document.getElementById('branchForest');
  const seedCard = DECK[0]; // The Fool
  
  const node = document.createElement('div');
  node.className = 'branch-node';
  node.innerHTML = `
    <div class="grimoire-card">
      <span class="mutation-badge">🌱 seed</span>
      <div class="card-header">
        <span class="card-number">#${seedCard.num}</span>
        <span class="card-gen">origin</span>
      </div>
      <div class="card-title">${seedCard.title}</div>
      <div class="card-body">${seedCard.body}</div>
      <div class="card-tags">
        ${seedCard.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
      </div>
    </div>
  `;
  forest.appendChild(node);
  
  generation = 1;
  branchCount = 1;
  document.getElementById('genNum').textContent = generation;
  
  console.log('🌱 Seed planted. Scroll down to grow the grimoire.');
  console.log('📖 The page consumes itself and grows downward forever.');
}

init();

// ── Keyboard Controls ──
document.addEventListener('keydown', (e) => {
  switch (e.key.toLowerCase()) {
    case 'g':
      console.log('🌿 Manual spawn triggered');
      spawnBranch();
      break;
    case 'm':
      console.log('🧬 Forcing mutation...');
      const mutation = MUTATIONS[Math.floor(Math.random() * MUTATIONS.length)];
      spawnBranch(mutation);
      break;
    case 'r':
      console.log('📜 Ancestor memory stack:', ancestorStack.length, 'entries');
      console.table(ancestorStack.slice(-10));
      break;
    case 'c':
      console.log('🎨 Random color shift');
      applyColorShift();
      break;
    case 't':
      console.log('🔤 Random typography drift');
      applyTypographyDrift();
      break;
    default:
      break;
  }
});

console.log('⌨️ Controls: [G] spawn branch · [M] force mutation · [R] view memory · [C] color shift · [T] typography drift');
</script>
</body>
</html>
